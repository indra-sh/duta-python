name: Publish to PyPI

# Publishes duta-sdk to PyPI via Trusted Publishing (OIDC, no stored token).
# Triggers when a version tag is pushed (e.g. v0.1.1), or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token: OIDC trusted publishing is used automatically
        # when id-token: write is set and a trusted publisher is configured on PyPI.
